name: tf-checks
on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:
jobs:
  basic-example:
    uses: clouddrove/github-shared-workflows/.github/workflows/stf-checks.yml@f6cad30db3bfad5fc248a08ab65ac82eb8dbcb82 # pinned to latest
    with:
      provider: none
      working_directory: './_examples/basic/'
      provider: none
  complete-example:
    uses: clouddrove/github-shared-workflows/.github/workflows/stf-checks.yml@f6cad30db3bfad5fc248a08ab65ac82eb8dbcb82 # pinned to latest
    with:
      provider: none
      working_directory: './_examples/complete/'
      provider: none

# Separate job for TFlint workflow call
  tf-lint:
    uses: clouddrove/github-shared-workflows/.github/workflows/tf-lint.yml@acffa6c5f585a4ba56500779f927db234a56ba9e # pinned to latest
    secrets:
      GITHUB: ${{ secrets.GITHUB }}
